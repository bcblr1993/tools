name: Release Software Scanner

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，如 v1.0.0

permissions:
  contents: write # 赋予流水线写入 Release 的权限

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: software_scanner.exe
          - os: ubuntu-latest
            artifact_name: software_scanner_linux
          - os: macos-latest
            artifact_name: software_scanner_macos

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python (Windows/macOS)
      if: matrix.os != 'ubuntu-latest'
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies (Windows/macOS)
      if: matrix.os != 'ubuntu-latest'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build with PyInstaller (Windows/macOS)
      if: matrix.os != 'ubuntu-latest'
      shell: bash
      run: |
        pyinstaller --onefile --console software_scanner.py
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/software_scanner.exe dist/software_scanner_win.exe
        else
          mv dist/software_scanner dist/software_scanner_macos
        fi

    - name: Build with PyInstaller on Linux (CentOS 7 Compatible)
      if: matrix.os == 'ubuntu-latest'
      run: |
        docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace quay.io/pypa/manylinux2014_x86_64 bash -c "\
          curl -sL https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -o miniconda.sh && \
          bash miniconda.sh -b -p /opt/conda && \
          /opt/conda/bin/conda create -y -n py311 python=3.11 && \
          /opt/conda/envs/py311/bin/pip install pyinstaller && \
          /opt/conda/envs/py311/bin/pyinstaller --onefile --console software_scanner.py && \
          chmod -R 777 dist build && \
          mv dist/software_scanner dist/software_scanner_linux"

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/software_scanner_win.exe
          dist/software_scanner_linux
          dist/software_scanner_macos
        # 允许失败，因为 matrix 会运行三次，只有存在的产物会被上传
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
