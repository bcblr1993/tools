name: Release Software Scanner

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发，如 v1.0.0

permissions:
  contents: write # 赋予流水线写入 Release 的权限

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: software_scanner.exe
          - os: ubuntu-latest
            artifact_name: software_scanner_linux
          - os: macos-latest
            artifact_name: software_scanner_macos

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile --console software_scanner.py
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/software_scanner.exe dist/software_scanner_win.exe
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          mv dist/software_scanner dist/software_scanner_linux
        else
          mv dist/software_scanner dist/software_scanner_macos
        fi

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/software_scanner_win.exe
          dist/software_scanner_linux
          dist/software_scanner_macos
        # 允许失败，因为 matrix 会运行三次，只有存在的产物会被上传
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
